<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capsulo</title>
  <script>
    // See open/index.html for why this bridge page exists — mail apps like
    // Gmail block bare com.saidinesh.someday:// links tapped directly from an
    // email body, but do allow tapping this https:// page, which fires the
    // app deep link from here instead.
    (function () {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) return;
      var token = new URLSearchParams(window.location.search).get('token');
      if (token) {
        window.location.href = 'com.saidinesh.someday://invite/' + encodeURIComponent(token);
      }
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card { max-width: 420px; width: 100%; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; color: #1a1a1a; }
    p { line-height: 1.6; margin-bottom: 1rem; color: #555; }
    .btn {
      display: inline-block;
      background: #b07d2a;
      color: #fff;
      text-decoration: none;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 0.5rem;
      width: 100%;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0ddd8;
      border-top-color: #b07d2a;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening Capsulo&hellip;</p>
    </div>

    <div id="fallback" class="hidden">
      <h1 id="fallback-title">Open Capsulo to continue</h1>
      <p id="fallback-message">Open the Capsulo app on your phone to accept this invite.</p>
      <a id="retry-btn" class="btn" href="#">Open Capsulo</a>
    </div>
  </div>

  <script>
    (function () {
      var token = new URLSearchParams(window.location.search).get('token');
      var deepLink = token ? ('com.saidinesh.someday://invite/' + encodeURIComponent(token)) : '';
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      function show(target) {
        ['loading', 'fallback'].forEach(function (el) {
          document.getElementById(el).classList.toggle('hidden', el !== target);
        });
      }

      function showFallback(title, message, showButton) {
        show('fallback');
        document.getElementById('fallback-title').textContent = title;
        document.getElementById('fallback-message').textContent = message;
        document.getElementById('retry-btn').classList.toggle('hidden', !showButton);
      }

      if (!token) {
        showFallback('Link error', 'This invite link is missing information. Please ask for a new invite.', false);
        return;
      }

      if (isIOS) {
        showFallback('Continue in Capsulo', 'Capsulo is on Android for now — open the app on your Android device to continue.', false);
        return;
      }

      document.getElementById('retry-btn').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      });

      // The actual deep-link attempt already fired in <head>, as early as
      // possible. This fallback only shows if the app didn't intercept it in
      // time (not installed, or the browser blocked the gesture-less
      // navigation) — if it did, this tab gets backgrounded before this fires.
      setTimeout(function () {
        showFallback('Open Capsulo to continue', 'Open the Capsulo app on your phone to accept this invite.', true);
      }, 1500);
    })();
  </script>
</body>
</html>
