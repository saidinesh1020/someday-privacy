<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capsulo</title>
  <script>
    // Fires the app deep link as early as physically possible — before any
    // CSS/JS loads — since Chrome only allows auto-navigating to a custom
    // scheme within a short window tied to the user's original tap on the
    // email link. Any delay here (e.g. waiting on the Supabase SDK CDN
    // fetch, which used to run first) risks falling outside that window,
    // silently failing even when the app is installed.
    //
    // Capsulo has no iOS app (Android-only, com.saidinesh.someday:// has no
    // handler on iOS) — attempting this navigation on iOS Safari before the
    // page has painted anything causes a blank page (WebKit gets stuck on
    // the failed scheme navigation instead of rendering the fallback UI).
    // Skip it there entirely; the body script below shows the fallback
    // immediately since there's no app to wait for anyway.
    (function () {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) return;

      var deepLink = 'com.saidinesh.someday://login-callback' + window.location.search + window.location.hash;
      var params = new URLSearchParams(window.location.hash.slice(1));
      if (!params.get('error')) {
        window.location.href = deepLink;
      }
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card { max-width: 420px; width: 100%; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; color: #1a1a1a; }
    p { line-height: 1.6; margin-bottom: 1rem; color: #555; }
    .btn {
      display: inline-block;
      background: #b07d2a;
      color: #fff;
      text-decoration: none;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 0.5rem;
      cursor: pointer;
      width: 100%;
    }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .btn-secondary {
      background: none;
      color: #b07d2a;
      text-decoration: underline;
      font-weight: 500;
      padding: 0.5rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0ddd8;
      border-top-color: #b07d2a;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .form { text-align: left; margin-top: 1rem; }
    .field-label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.3rem;
    }
    .form-field { margin-bottom: 1rem; }
    .sd-input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      font-size: 1rem;
      background: #fff;
      color: #2c2c2c;
    }
    .sd-input:focus { outline: none; border-color: #b07d2a; }
    .error-msg { color: #b3413a; font-size: 0.85rem; margin: -0.25rem 0 0.75rem; text-align: left; }
    .success-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening Capsulo&hellip;</p>
    </div>

    <!-- Signup confirmation / generic fallback -->
    <div id="fallback" class="hidden">
      <h1 id="fallback-title">Almost there</h1>
      <p id="fallback-message">Open the Capsulo app on this device to continue.</p>
      <a id="retry-btn" class="btn" href="#">Open Capsulo</a>
    </div>

    <!-- Password reset form (recovery type) -->
    <div id="reset-form" class="hidden">
      <h1>Set new password</h1>
      <p>Choose a new password for your Capsulo account.</p>
      <div class="form">
        <div class="form-field">
          <label class="field-label">New password</label>
          <input id="new-password" class="sd-input" type="password" autocomplete="new-password" placeholder="At least 6 characters" />
        </div>
        <div class="form-field">
          <label class="field-label">Confirm password</label>
          <input id="confirm-password" class="sd-input" type="password" autocomplete="new-password" placeholder="Repeat your password" />
        </div>
        <p id="reset-error" class="error-msg hidden"></p>
        <button id="reset-submit" class="btn" type="button">Update password</button>
        <button id="reset-open-app" class="btn btn-secondary" type="button">Have the Capsulo app? Tap to open it instead</button>
      </div>
    </div>

    <div id="reset-success" class="hidden">
      <div class="success-icon">✓</div>
      <h1>Password updated</h1>
      <p>You can now sign in with your new password in the Capsulo app.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script>
    (function () {
      var SUPABASE_URL = 'https://vzlqmvdyeaqqsaxinhyj.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bHFtdmR5ZWFxcXNheGluaHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDAyOTcsImV4cCI6MjA5NjgxNjI5N30.OLXHvn--TYbr0UbYntRNJzGd6mbuURrOrxmtfzpHlRk';
      var APP_SCHEME = 'com.saidinesh.someday://login-callback';

      var hash = window.location.hash;   // #access_token=...&refresh_token=...&type=...
      var search = window.location.search; // ?code=... (PKCE flow)
      var deepLink = APP_SCHEME + search + hash;

      var params = new URLSearchParams(hash.slice(1));
      var type = params.get('type');
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var errorCode = params.get('error_code');
      var fragmentError = params.get('error');
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      function show(id) {
        ['loading', 'fallback', 'reset-form', 'reset-success'].forEach(function (el) {
          document.getElementById(el).classList.toggle('hidden', el !== id);
        });
      }

      function showFallback(title, message) {
        show('fallback');
        document.getElementById('fallback-title').textContent = title;
        document.getElementById('fallback-message').textContent = message;
      }

      // No iOS app exists yet, so an "open the app" button has nothing to do
      // there — hide it rather than show a dead control.
      if (isIOS) {
        document.getElementById('retry-btn').classList.add('hidden');
        document.getElementById('reset-open-app').classList.add('hidden');
      } else {
        document.getElementById('retry-btn').addEventListener('click', function (e) {
          e.preventDefault();
          window.location.href = deepLink;
        });
        document.getElementById('reset-open-app').addEventListener('click', function () {
          window.location.href = deepLink;
        });
      }

      if (fragmentError) {
        showFallback(
          'Link expired',
          errorCode === 'otp_expired'
            ? 'This link has expired. Open Capsulo and request a new one.'
            : 'This link is no longer valid. Open Capsulo and try again.'
        );
        return;
      }

      function toUserMessage(error) {
        var msg = (error && error.message) || '';
        var code = (error && error.code) || '';
        if (code === 'same_password' || msg.indexOf('different from the old password') !== -1) {
          return 'Your new password must be different from your current one.';
        }
        if (code === 'weak_password' || msg.indexOf('Password should be') !== -1) {
          return 'Password must be at least 6 characters.';
        }
        if (code === 'session_not_found' || msg.indexOf('session_not_found') !== -1) {
          return 'Your session has expired. Open Capsulo and request a new reset link.';
        }
        return 'Something went wrong. Please try again.';
      }

      function setError(msg) {
        var el = document.getElementById('reset-error');
        if (msg) {
          el.textContent = msg;
          el.classList.remove('hidden');
        } else {
          el.classList.add('hidden');
        }
      }

      // Shows the in-browser reset form as the fallback for recovery links —
      // only reached if the app didn't intercept the deep link below in time.
      // The SDK script is deferred (so it can't delay the deep-link attempt in
      // <head>) — it's virtually always ready by now, but guard against a slow
      // network still loading it.
      function showResetForm() {
        if (!window.supabase) {
          setTimeout(showResetForm, 100);
          return;
        }
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken }).then(function (res) {
          if (res.error) {
            showFallback('Link expired', 'This reset link is no longer valid. Open Capsulo and request a new one.');
            return;
          }
          show('reset-form');
        });

        document.getElementById('reset-submit').addEventListener('click', function () {
          var newPassword = document.getElementById('new-password').value;
          var confirmPassword = document.getElementById('confirm-password').value;
          setError('');

          if (!newPassword || !confirmPassword) { setError('Please fill in both fields.'); return; }
          if (newPassword.length < 6) { setError('Password must be at least 6 characters.'); return; }
          if (newPassword !== confirmPassword) { setError('Passwords do not match.'); return; }

          var btn = document.getElementById('reset-submit');
          btn.disabled = true;
          btn.textContent = 'Updating…';

          supabase.auth.updateUser({ password: newPassword }).then(function (res) {
            btn.disabled = false;
            btn.textContent = 'Update password';
            if (res.error) {
              setError(toUserMessage(res.error));
              return;
            }
            show('reset-success');
          }).catch(function () {
            btn.disabled = false;
            btn.textContent = 'Update password';
            setError('Something went wrong. Please try again.');
          });
        });
      }

      // The actual deep-link attempt already fired in <head>, as early as
      // possible. Everything below is purely the fallback for when the app
      // doesn't intercept it in time (not installed on this device, or the
      // browser blocked the gesture-less custom-scheme navigation) — if the
      // app does intercept it, this tab gets backgrounded before this timer
      // ever fires.
      setTimeout(function () {
        if (type === 'recovery' && accessToken && refreshToken) {
          showResetForm();
        } else if (type === 'signup') {
          showFallback(
            'Email confirmed',
            isIOS
              ? 'Your email is confirmed. Capsulo is on Android for now — open the app on your Android device to continue.'
              : 'Your email is confirmed. Open the Capsulo app on your phone to continue.'
          );
        } else {
          showFallback(
            'Continue in Capsulo',
            isIOS
              ? 'Capsulo is on Android for now — open the app on your Android device to continue.'
              : 'Open the Capsulo app on your phone to continue.'
          );
        }
      }, isIOS ? 0 : 1500);
    })();
  </script>
</body>
</html>
