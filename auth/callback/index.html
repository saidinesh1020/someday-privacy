<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capsulo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf9f6;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card { max-width: 420px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; color: #1a1a1a; }
    p { line-height: 1.6; margin-bottom: 1rem; color: #555; }
    .btn {
      display: inline-block;
      background: #b07d2a;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0ddd8;
      border-top-color: #b07d2a;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .copy-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      align-items: center;
    }
    .copy-row input {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.75rem;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #555;
    }
    .copy-btn {
      background: #eee;
      border: 1px solid #e0ddd8;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .hint { font-size: 0.8rem; color: #999; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <p>Opening Capsulo&hellip;</p>
    </div>

    <div id="fallback" class="hidden">
      <h1 id="fallback-title">Almost there</h1>
      <p id="fallback-message">Open the Capsulo app on this device to continue.</p>
      <a id="retry-btn" class="btn" href="#">Open Capsulo</a>
      <div id="copy-section" class="hidden">
        <p class="hint">This link only works once and has already been used on this device. To finish on your phone, copy this exact page's link below and open it there — don't reuse the original email link, it's now expired.</p>
        <div class="copy-row">
          <input id="copy-input" type="text" readonly />
          <button id="copy-btn" class="copy-btn" type="button">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var APP_SCHEME = 'com.saidinesh.someday://login-callback';
      var hash = window.location.hash;   // #access_token=...&refresh_token=...&type=...
      var search = window.location.search; // ?code=... (PKCE flow)
      var deepLink = APP_SCHEME + search + hash;

      var params = new URLSearchParams(hash.slice(1));
      var type = params.get('type');
      var errorCode = params.get('error_code');
      var fragmentError = params.get('error');

      function showFallback(title, message, opts) {
        opts = opts || {};
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('fallback-title').textContent = title;
        document.getElementById('fallback-message').textContent = message;
        document.getElementById('fallback').classList.remove('hidden');

        // For recovery, the one-time token was already consumed by the redirect
        // that landed us here — the *original email link* is now dead. What's
        // still valid is this page's own URL (the fragment holds live session
        // tokens), so offer that to copy across to the device with the app.
        if (opts.showCopyLink) {
          document.getElementById('copy-section').classList.remove('hidden');
          var input = document.getElementById('copy-input');
          input.value = window.location.href;
          document.getElementById('copy-btn').addEventListener('click', function () {
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard && navigator.clipboard.writeText(input.value).catch(function () {
              document.execCommand('copy');
            });
          });
        }
      }

      document.getElementById('retry-btn').addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      });

      if (fragmentError) {
        showFallback(
          'Link expired',
          errorCode === 'otp_expired'
            ? 'This link has expired. Open Capsulo and request a new one.'
            : 'This link is no longer valid. Open Capsulo and try again.'
        );
        return;
      }

      // Attempt the deep link immediately. If the app handles it, this page
      // is backgrounded/closed before the fallback timer below ever fires.
      window.location.href = deepLink;

      setTimeout(function () {
        if (type === 'recovery') {
          showFallback(
            'Password reset',
            'Capsulo isn\'t installed on this device.',
            { showCopyLink: true }
          );
        } else if (type === 'signup') {
          showFallback(
            'Email confirmed',
            'Your email is confirmed. Open the Capsulo app on your phone to continue.'
          );
        } else {
          showFallback(
            'Continue in Capsulo',
            'Open the Capsulo app on your phone to continue.'
          );
        }
      }, 1500);
    })();
  </script>
</body>
</html>
